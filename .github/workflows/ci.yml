name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        features: ["--all-features", "--no-default-features"]
    runs-on: ${{ matrix.os }}
    # The xray-cli binary (wickra-xray) and the C ABI cdylib
    # (wickra_xray) share a stem on Windows, so building both in one
    # --workspace pass can race on the same .pdb and trip LNK1201. Dropping debug
    # info (tests do not need it) removes the collision and keeps runner disk use
    # down; RUSTFLAGS is part of the cache key.
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The PyO3 extension cdylib is built and tested by the `python` job via
      # maturin; the C ABI cdylib by the `c-abi` job. Exclude both here.
      - run: cargo build --workspace ${{ matrix.features }} --exclude wickra-xray-python --exclude wickra-xray-c
      - run: cargo test --workspace ${{ matrix.features }} --exclude wickra-xray-python --exclude wickra-xray-c

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  msrv:
    name: MSRV workspace (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The Node binding (napi 3) needs Rust 1.88 and is checked separately; the
      # Python binding needs maturin's platform link flags and is built by the
      # `python` job. The library, CLI, C ABI and WASM stay at 1.86.
      - run: >
          cargo build --workspace
          --exclude wickra-xray-python
          --exclude wickra-xray-node

  msrv-node:
    name: MSRV node (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build -p wickra-xray-node

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-deny
      - run: cargo deny check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-llvm-cov
      # Measure the core in its sequential (no rayon) configuration — the frame
      # is byte-identical either way, and this keeps coverage deterministic.
      - name: Generate coverage (lcov)
        run: >
          cargo llvm-cov --no-default-features
          -p xray-core
          --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fuzz-smoke:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-fuzz
      - name: Fuzz spec_parse (30 s)
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu spec_parse -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz dataset_parse (30 s)
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu dataset_parse -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz build_frame (30 s)
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu build_frame -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz book_fold (30 s)
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu book_fold -- -max_total_time=30
        working-directory: fuzz

  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: pip install maturin pytest
      - run: maturin build --out dist
        working-directory: bindings/python
      - run: pip install --no-index --find-links bindings/python/dist wickra-xray
      - run: pytest bindings/python/tests -q

  node:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22", "24"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json
      # npm install (not npm ci): the per-platform optionalDependencies point at
      # native packages that are not published until the first release.
      - name: Install Node dependencies
        run: cd bindings/node && npm install --no-audit --no-fund
      - name: Build native module
        run: cd bindings/node && npx napi build --platform --release
      # The generated glue is platform-independent, so a drift check on one OS is
      # enough — and avoids a spurious CRLF/LF diff on the Windows runner.
      - name: Check index.js / index.d.ts are in sync
        if: runner.os == 'Linux'
        run: cd bindings/node && git diff --exit-code -- index.js index.d.ts
      - name: Run Node tests
        run: cd bindings/node && node --test

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install wasm-pack
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: wasm-pack
      - name: Build the wasm binding
        run: wasm-pack build --target web
        working-directory: bindings/wasm

  web:
    name: Web renderer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install wasm-pack
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: wasm-pack
      # The web app depends on the wasm binding's pkg/ via a file: dependency, so
      # build it before installing web dependencies.
      - name: Build the wasm binding
        run: wasm-pack build --target web
        working-directory: bindings/wasm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Build and lint the web renderer
        run: cd web && npm ci && npm run build && npm run lint

  c-abi:
    name: C ABI on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cbindgen
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cbindgen
      - name: Build the C ABI library (cdylib + staticlib)
        run: cargo build -p wickra-xray-c --release
      - name: Rust unit tests
        run: cargo test -p wickra-xray-c
      # The generated header is platform-independent, so checking drift on one OS
      # is enough — and avoids a spurious CRLF/LF diff on the Windows runner. This
      # also validates the vendored Go copy.
      - name: Check the C header (cbindgen + Go copy) is in sync
        if: runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/check-cbindgen.sh
      # The real cross-language test: a foreign C consumer links the generated
      # header + the compiled library and runs. If this passes on all three OSes,
      # every C-capable language can link the same way.
      - name: Build and run the C example (CMake + ctest)
        shell: bash
        run: |
          cmake -S examples/c -B examples/c/build
          cmake --build examples/c/build --config Release
          ctest --test-dir examples/c/build -C Release --output-on-failure

  go:
    name: Go on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the C ABI library
        run: cargo build -p wickra-xray-c --release
      - name: Vendored header in sync with the C ABI
        shell: bash
        run: |
          if ! diff -u bindings/c/include/wickra_xray.h bindings/go/include/wickra_xray.h; then
            echo "::error::bindings/go/include/wickra_xray.h is stale — copy bindings/c/include/wickra_xray.h over it"
            exit 1
          fi
      - name: Stage the native library
        shell: bash
        run: |
          case "$RUNNER_ARCH" in
            X64) arch=amd64 ;;
            ARM64) arch=arm64 ;;
            *) echo "::error::unsupported RUNNER_ARCH '$RUNNER_ARCH'"; exit 1 ;;
          esac
          case "$RUNNER_OS" in
            Linux)   dir="linux_$arch";   lib=target/release/libwickra_xray.so ;;
            macOS)   dir="darwin_$arch";  lib=target/release/libwickra_xray.dylib ;;
            Windows) dir="windows_$arch"; lib=target/release/wickra_xray.dll ;;
          esac
          mkdir -p "bindings/go/lib/$dir"
          cp "$lib" "bindings/go/lib/$dir/"
          echo "WICKRA_GO_LIBDIR=$PWD/bindings/go/lib/$dir" >> "$GITHUB_ENV"
      - name: Check gofmt
        shell: bash
        run: |
          unformatted="$(gofmt -l bindings/go)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: Vet and test the Go binding
        shell: bash
        run: |
          export PATH="$WICKRA_GO_LIBDIR:$PATH"
          cd bindings/go
          go vet ./...
          go test ./...

  csharp:
    name: C# on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0"
      # The test project copies the native library from target/release (see the
      # <Content> items), so build it in the release profile here.
      - name: Build the C ABI library
        run: cargo build -p wickra-xray-c --release
      - name: Test the C# binding
        run: dotnet test bindings/csharp/WickraXray.Tests/WickraXray.Tests.csproj -c Release

  java:
    name: Java on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The pom points native.lib.dir at target/debug, so build the debug profile.
      - name: Build the C ABI library
        run: cargo build -p wickra-xray-c
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Test the Java binding
        run: mvn -B -f bindings/java test

  r:
    name: R on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      WKXRAY_INC: ${{ github.workspace }}/bindings/c/include
      WKXRAY_LIB: ${{ github.workspace }}/target/release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the C ABI library
        run: cargo build -p wickra-xray-c --release
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: "release"
          use-public-rspm: true
      - name: Install and test the R binding
        shell: bash
        # github.workspace is a backslash path on Windows; Makevars(.win) (sh) and
        # mingw need forward slashes. The Makevars do not bake an rpath, so the
        # native library must be on the loader path at run time.
        run: |
          export WKXRAY_INC="${WKXRAY_INC//\\//}"
          export WKXRAY_LIB="${WKXRAY_LIB//\\//}"
          if command -v cygpath >/dev/null 2>&1; then
            export PATH="$(cygpath -u "$WKXRAY_LIB"):$PATH"
          else
            export LD_LIBRARY_PATH="$WKXRAY_LIB:$LD_LIBRARY_PATH"
            export DYLD_LIBRARY_PATH="$WKXRAY_LIB:$DYLD_LIBRARY_PATH"
          fi
          R CMD INSTALL bindings/r
          Rscript bindings/r/tests/run_tests.R
